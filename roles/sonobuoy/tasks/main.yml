- name: Run sonobuoy tests
  when: sonobuoy_run
  environment:
    KUBECONFIG: "{{ sonobuoy_kubeconfig_file }}"
  block:
    - name: Execute tests
      ansible.builtin.shell:
        cmd: "{{ sonobuoy_unarchive_dest ~ '/sonobuoy run ' ~ sonobuoy_run_options }}"

    - name: Get sonobuoy output
      ansible.builtin.command:
        cmd: "{{ sonobuoy_unarchive_dest ~ '/sonobuoy retrieve ' ~ sonobuoy_results_dest }}"
      register: _retrieve

    - name: Get sonobuoy results
      ansible.builtin.command:
        cmd: "{{ sonobuoy_unarchive_dest ~ '/sonobuoy results ' ~ _retrieve.stdout }}"
      register: _results

    - name: Save output to file
      ansible.builtin.copy:
        content: "{{ _results.stdout }}"
        dest: "{{ sonobuoy_results_dest ~ '/report.txt' }}"

    - name: Cleanup
      ansible.builtin.command:
        cmd: "{{ sonobuoy_unarchive_dest ~ '/sonobuoy delete --wait' }}"
      when: sonobuoy_delete
